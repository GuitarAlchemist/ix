name: Wiki Sync

# Auto-regenerate the ix GitHub Wiki on every push to main.
# Before this workflow existed, the ix wiki was only refreshed when
# Demerzel's cross-repo workflow fired on Demerzel-repo path changes,
# so ix-only commits (refactors, new tools, design docs) left the wiki
# stale until someone manually dispatched the Demerzel workflow. This
# file cuts that cross-repo dependency — ix pushes refresh ix's wiki,
# no Demerzel involvement required.
#
# Content is generated from README.md, CLAUDE.md, the workspace file
# tree, and git log, mirroring the logic in
# governance/demerzel/.github/workflows/demerzel-wiki-cross-repo.yml
# so both pipelines produce the same wiki shape.

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'CLAUDE.md'
      - 'docs/**'
      - 'crates/**/Cargo.toml'
      - 'Cargo.toml'
      - '.github/workflows/wiki-sync.yml'
  # Weekly fallback: catch sessions that only touched source code
  # (which doesn't match any of the push paths above) so the wiki
  # stays eventually consistent regardless of activity shape.
  schedule:
    - cron: '17 6 * * 1'  # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}

    steps:
      - name: Checkout ix
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: repo

      - name: Check wiki exists
        id: wiki_check
        run: |
          if git clone "https://${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki 2>/dev/null; then
            echo "WIKI_EXISTS=true" >> "$GITHUB_OUTPUT"
          else
            echo "WIKI_EXISTS=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ix wiki repo not found. Enable Wiki in repo settings and seed at least one page, then re-run this workflow."
          fi

      - name: Generate wiki pages
        if: steps.wiki_check.outputs.WIKI_EXISTS == 'true'
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          SHORT_SHA=$(cd repo && git rev-parse --short HEAD)

          # ── Home page ─────────────────────────────────────────────
          cat > wiki/Home.md <<HOMEEOF
          <!-- Auto-generated by ix Wiki Sync -->

          # ix — GuitarAlchemist

          > Rust ML/math algorithm workspace. Part of the [GuitarAlchemist](https://github.com/GuitarAlchemist) ecosystem, governed by [Demerzel](https://github.com/GuitarAlchemist/Demerzel).

          HOMEEOF

          if [ -f repo/README.md ]; then
            echo "## Overview" >> wiki/Home.md
            echo "" >> wiki/Home.md
            # Extract content from start of README through the end of the
            # second H2. Matches the Demerzel cross-repo workflow's awk.
            awk '/^## /{if(++c==2)exit}c>=0' repo/README.md >> wiki/Home.md
            echo "" >> wiki/Home.md
          fi

          if [ -f repo/CLAUDE.md ]; then
            echo "## Development Guide" >> wiki/Home.md
            echo "" >> wiki/Home.md
            # Content before the Demerzel governance marker, first 50 lines
            # to keep the Home page readable. Full file is linked below.
            # Use awk 'NR<=50' instead of 'head -50' so the upstream sed
            # can finish writing without getting SIGPIPE under pipefail.
            sed -n '1,/<!-- BEGIN DEMERZEL GOVERNANCE -->/p' repo/CLAUDE.md | awk 'NR<=50' >> wiki/Home.md
            echo "" >> wiki/Home.md
            echo "[Full CLAUDE.md](${REPO_URL}/blob/main/CLAUDE.md)" >> wiki/Home.md
          fi

          # ── Governance page ───────────────────────────────────────
          if [ -d repo/governance/demerzel ]; then
            cat > wiki/Governance.md <<GOVEOF
          <!-- Auto-generated by ix Wiki Sync -->

          # Governance

          This repo is governed by the [Demerzel governance framework](https://github.com/GuitarAlchemist/Demerzel).

          ## Constitution Hierarchy

          - [Asimov Laws](https://github.com/GuitarAlchemist/Demerzel/wiki/Constitution-Asimov) (Articles 0-5)
          - [Default Constitution](https://github.com/GuitarAlchemist/Demerzel/wiki/Constitution-Default) (Articles 1-14)
          - [Governance Mandate](https://github.com/GuitarAlchemist/Demerzel/wiki/Constitution-Mandate)

          ## Policies

          See [Demerzel Policy Reference](https://github.com/GuitarAlchemist/Demerzel/wiki/Policies).

          ## State Directory

          This repo maintains belief persistence in \`state/\`:
          - \`state/beliefs/\` — Tetravalent / hexavalent belief states
          - \`state/pdca/\` — PDCA cycle tracking
          - \`state/knowledge/\` — Knowledge transfer records
          - \`state/snapshots/\` — Belief snapshots

          ---
          *Governed by [Demerzel](https://github.com/GuitarAlchemist/Demerzel) under the Asimov constitution.*
          GOVEOF
          fi

          # ── Project Structure page ────────────────────────────────
          # Use 'awk NR<=60' instead of 'head -60' so the upstream sort
          # can finish writing without getting SIGPIPE under pipefail
          # (ix has 100+ dirs at depth-2, so the pipe truncation is
          # guaranteed to trip).
          cat > wiki/Project-Structure.md <<STRUCTEOF
          <!-- Auto-generated by ix Wiki Sync -->

          # Project Structure

          \`\`\`
          $(cd repo && find . -maxdepth 2 -type d \
            ! -path './.git*' \
            ! -path './node_modules*' \
            ! -path './bin*' \
            ! -path './obj*' \
            ! -path './target*' \
            ! -path './.vs*' \
            | sort \
            | sed 's|^\./||' \
            | awk 'NR<=60')
          \`\`\`

          ## Crates

          \`\`\`
          $(cd repo && ls -1 crates 2>/dev/null | sort | sed 's|^|crates/|')
          \`\`\`

          ---
          See also: [Home](Home) | [Governance](Governance) | [Recent Activity](Recent-Activity)
          STRUCTEOF

          # ── Recent Activity page ──────────────────────────────────
          cat > wiki/Recent-Activity.md <<ACTEOF
          <!-- Auto-generated by ix Wiki Sync -->

          # Recent Activity

          ## Last 20 Commits

          | Date | Author | Message |
          |------|--------|---------|
          $(cd repo && git log --format='| %ci | %an | %s |' -20 2>/dev/null)

          ---
          *Auto-generated from git history. Last synced: ${TIMESTAMP} (ix @ ${SHORT_SHA}).*
          ACTEOF

          # ── Sidebar + Footer ──────────────────────────────────────
          cat > wiki/_Sidebar.md <<SIDEEOF
          **[Home](Home)**

          - [Project Structure](Project-Structure)
          - [Governance](Governance)
          - [Recent Activity](Recent-Activity)

          ---
          *Synced by [ix Wiki Sync](${REPO_URL}/blob/main/.github/workflows/wiki-sync.yml)*
          SIDEEOF

          cat > wiki/_Footer.md <<FOOTEOF
          ---
          *Auto-generated by [ix Wiki Sync](${REPO_URL}/blob/main/.github/workflows/wiki-sync.yml) on ${TIMESTAMP} from commit [\`${SHORT_SHA}\`](${REPO_URL}/commit/${SHORT_SHA}).*
          FOOTEOF

          echo "Generated wiki pages:"
          ls wiki/*.md

      - name: Push wiki changes
        if: steps.wiki_check.outputs.WIKI_EXISTS == 'true'
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to publish."
          else
            SHORT_SHA=$(cd ../repo && git rev-parse --short HEAD)
            git commit -m "Auto-sync ix wiki from ${SHORT_SHA}"
            git push
            echo "Wiki updated."
          fi
