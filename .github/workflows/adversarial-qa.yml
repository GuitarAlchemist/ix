name: Adversarial QA

on:
  pull_request:
    paths:
      - 'crates/ga-chatbot/**'
      - 'state/voicings/**'
      - 'tests/adversarial/**'
  push:
    branches:
      - main
    paths:
      - 'crates/ga-chatbot/**'
      - 'state/voicings/**'
      - 'tests/adversarial/**'
  workflow_dispatch:

jobs:
  deterministic:
    name: Deterministic QA (Layers 0-2) + Regression Gauge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-adversarial-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-adversarial-

      - name: Build ga-chatbot
        run: cargo build -p ga-chatbot

      - name: Create output directory
        run: mkdir -p /tmp/adversarial-results

      - name: Run deterministic QA harness
        # Exit code reflects the regression gauge: non-zero only when at least
        # one prompt's actual verdict differs from its declared expected_verdict.
        # Raw F/D counts are noisy because many adversarial prompts are expected
        # to fail (injection, hallucination) and LLM-deferred prompts have no
        # deterministic ground truth.
        run: |
          cargo run -p ga-chatbot -- qa \
            --corpus tests/adversarial/corpus/ \
            --fixtures tests/adversarial/fixtures/stub-responses.jsonl \
            --corpus-dir state/voicings/ \
            --output /tmp/adversarial-results/det-results.jsonl

      - name: Report regression gauge summary
        if: always()
        run: |
          SUMMARY="/tmp/adversarial-results/summary.json"
          if [ ! -f "$SUMMARY" ]; then
            echo "::warning::Gauge summary not found (harness likely crashed before emit)"
            exit 0
          fi

          echo "=== Regression Gauge Summary ==="
          cat "$SUMMARY"
          echo ""

          MATCH=$(jq -r .match "$SUMMARY")
          MISMATCH=$(jq -r .mismatch "$SUMMARY")
          GRADED=$(jq -r .graded "$SUMMARY")
          DEFERRED=$(jq -r .deferred_llm "$SUMMARY")
          RATE=$(jq -r '.match_rate * 100 | floor' "$SUMMARY")

          echo "::notice::Gauge: ${MATCH}/${GRADED} match (${RATE}%), ${MISMATCH} regression candidates, ${DEFERRED} deferred to LLM judge"

          if [ "$MISMATCH" -gt 0 ]; then
            echo "::error::$MISMATCH prompt(s) have actual != expected verdict — regression detected"
            jq -r '.mismatches[] | "  \(.id) [\(.category)] actual=\(.actual) expected=\(.expected)"' "$SUMMARY"
          fi

      - name: Upload deterministic results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: adversarial-qa-results
          path: /tmp/adversarial-results/
          retention-days: 30

      - name: LLM judge panel not yet wired
        run: |
          echo "::notice::LLM judge panel not yet wired — deterministic-only gauge. Octopus dispatch will be added in Phase 3."

  unit-tests:
    name: Unit tests (ga-chatbot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-adversarial-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-adversarial-

      - name: Run ga-chatbot tests
        run: cargo test -p ga-chatbot --lib

      - name: Clippy
        run: cargo clippy -p ga-chatbot --tests -- -D warnings
