[package]
name = "ix-optick-invariants"
version = "0.1.0"
edition = "2021"
description = "Corpus-reading invariant checker for the OPTIC-K mmap index — complements ix-invariant-produce (synthetic exemplars) with data-level invariant firings."
license = "MIT"
repository = "https://github.com/GuitarAlchemist/ix"

[dependencies]
ix-optick = { path = "../ix-optick" }
ix-invariant-coverage = { path = "../ix-invariant-coverage" }
ix-bracelet = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }

[[bin]]
name = "ix-optick-invariants"
path = "src/main.rs"
