[package]
name = "ix-value"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
categories = ["command-line-utilities"]
keywords = ["business-value", "rice", "scorecard", "catalog", "governance"]
description = "Business-Value Scorecard — federate per-repo state/value/manifest.json into state/value/catalog.jsonl (RICE→stars). Plain Rust; DuckDB only reads the emitted catalog. Mirrors ix-streeling."

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
clap = { workspace = true }
chrono = { workspace = true }
walkdir = "2"
anyhow = "1"

[[bin]]
name = "ix-value"
path = "src/main.rs"

[dev-dependencies]
tempfile = { workspace = true }
