<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ix-voicings — t-SNE explorer</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0d10; color: #d6dce4; font: 13px/1.4 system-ui, sans-serif; overflow: hidden; }
  #canvas { display: block; cursor: crosshair; }
  #hud { position: fixed; top: 12px; left: 12px; padding: 10px 14px; background: rgba(20,24,30,0.85); border: 1px solid #2a313b; border-radius: 6px; max-width: 320px; pointer-events: none; }
  #hud h1 { margin: 0 0 6px; font-size: 13px; font-weight: 600; color: #fff; }
  #hud .meta { color: #8a93a0; font-size: 11px; }
  #legend { margin-top: 8px; }
  #legend span { display: inline-block; margin-right: 10px; }
  #legend i { display: inline-block; width: 10px; height: 10px; border-radius: 50%; vertical-align: middle; margin-right: 4px; }
  #status { position: fixed; bottom: 12px; left: 12px; color: #8a93a0; font-size: 11px; }
  #tooltip { position: fixed; padding: 8px 10px; background: rgba(20,24,30,0.95); border: 1px solid #3a4250; border-radius: 4px; pointer-events: none; display: none; max-width: 280px; font-size: 12px; }
  #tooltip .name { color: #fff; font-weight: 600; }
  #tooltip .row { color: #aab2bf; margin-top: 4px; font-family: ui-monospace, monospace; font-size: 11px; }
  #controls { position: fixed; top: 12px; right: 12px; padding: 10px 14px; background: rgba(20,24,30,0.85); border: 1px solid #2a313b; border-radius: 6px; }
  #controls label { display: block; margin: 4px 0; font-size: 11px; color: #8a93a0; }
  #controls input[type=checkbox] { margin-right: 6px; }
  #region { position: fixed; bottom: 36px; right: 12px; padding: 10px 14px; background: rgba(20,24,30,0.92); border: 1px solid #2a313b; border-radius: 6px; max-width: 360px; max-height: 60vh; overflow: auto; display: none; }
  #region h2 { margin: 0 0 6px; font-size: 12px; font-weight: 600; color: #fff; }
  #region .summary { color: #aab2bf; font-size: 11px; margin-bottom: 8px; }
  #region .summary span { display: inline-block; margin-right: 10px; }
  #region .summary i { display: inline-block; width: 8px; height: 8px; border-radius: 50%; vertical-align: middle; margin-right: 4px; }
  #region table { width: 100%; border-collapse: collapse; font-size: 11px; }
  #region td { padding: 2px 6px 2px 0; color: #aab2bf; font-family: ui-monospace, monospace; vertical-align: top; }
  #region td.id { color: #d6dce4; white-space: nowrap; }
  #region td.name { color: #fff; }
  #region .more { color: #6a7280; font-size: 11px; margin-top: 6px; }
  #region .close { position: absolute; top: 6px; right: 8px; cursor: pointer; color: #6a7280; font-size: 14px; }
  #region .close:hover { color: #fff; }
  .selection-marker { position: fixed; pointer-events: none; border: 1px solid rgba(214,220,228,0.7); border-radius: 50%; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <h1>ix-voicings · t-SNE explorer</h1>
  <div class="meta" id="meta">loading…</div>
  <div id="legend">
    <span><i style="background:#4ea1ff"></i>guitar</span>
    <span><i style="background:#7bd88f"></i>bass</span>
    <span><i style="background:#f5a04a"></i>ukulele</span>
  </div>
</div>
<div id="controls">
  <label><input type="checkbox" id="showGuitar" checked>guitar</label>
  <label><input type="checkbox" id="showBass" checked>bass</label>
  <label><input type="checkbox" id="showUkulele" checked>ukulele</label>
  <label><input type="checkbox" id="showClusters" checked>cluster labels</label>
  <hr style="border:0;border-top:1px solid #2a313b;margin:8px 0">
  <label style="color:#d6dce4;font-weight:600">color by</label>
  <label><input type="radio" name="colorBy" value="instrument" checked>instrument</label>
  <label><input type="radio" name="colorBy" value="cluster">cluster (15)</label>
  <label><input type="radio" name="colorBy" value="family">chord family</label>
</div>
<div id="status">scroll to zoom · drag to pan · hover for chord · click for region</div>
<div id="tooltip"></div>
<div id="region"></div>
<div id="selectionMarker" class="selection-marker" style="display:none"></div>

<script>
"use strict";

// Per-instrument render weights: guitar dominates the corpus (~95%) so we
// draw it small and translucent as background, then layer the minorities
// (bass, ukulele — ~2.5% each) on top with bigger, brighter dots so they
// don't get buried under the guitar fill.
const STYLES = {
  guitar:  { color: "#4ea1ff", radius: 1.0, alpha: 0.35 },
  bass:    { color: "#7bd88f", radius: 2.0, alpha: 0.85 },
  ukulele: { color: "#f5a04a", radius: 2.0, alpha: 0.85 },
};
// Selection radius (pixels) for click-to-explore-region.
const REGION_RADIUS_PX = 40;
// Cap how many neighbours we list in the region panel (keeps the DOM cheap).
const REGION_MAX_LIST = 30;

// Stable HSL palette for categorical fields with unbounded cardinality
// (cluster, family). Hue spread by golden angle so adjacent indices land
// in visually distinct buckets.
function categoricalColor(i) {
  if (i < 0) return "#3a4250"; // unknown / unmapped
  const hue = (i * 137.508) % 360; // golden-angle conjugate
  return `hsl(${hue.toFixed(1)}, 70%, 60%)`;
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { alpha: false });
const meta = document.getElementById("meta");
const tooltip = document.getElementById("tooltip");

let points = [];      // {id, instrument, x, y, sx, sy} -- sx/sy are screen
let guitarIdx = [];   // indices of guitar points (drawn first, faded background)
let minorityIdx = []; // indices of bass+ukulele points, shuffled once at load
                      // so neither color systematically wins occlusion ties
let details = {};     // "guitar_v0042" -> details row
let clusters = [];    // cluster-layout array (3D pts; we use [0] and [2] as x/y)
let bounds = null;    // {minx, maxx, miny, maxy}
let view = { tx: 0, ty: 0, scale: 1 };
let dragging = null;
let dragMoved = false;
let visible = { guitar: true, bass: true, ukulele: true };
let showClusters = true;
let colorBy = "instrument";       // "instrument" | "cluster" | "family"
let assignments = null;           // { clusters, cluster_by_inst, family_by_inst }
// Pre-cached per-point fill color for the active colorBy mode, indexed
// parallel to `points`. Recomputed when colorBy or assignments change.
let pointColors = null;
// Pre-cached per-point fill alpha + dot radius. In instrument mode these
// vary by instrument (guitar background-faded, minorities boosted); in
// cluster/family modes everything renders at one weight so the categorical
// signal doesn't get overwritten by the imbalance fix.
let pointAlphas = null;
let pointRadii = null;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + "px";
  canvas.style.height = innerHeight + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (points.length) { fitView(); render(); }
}
addEventListener("resize", resize);

function fitView() {
  if (!bounds) return;
  const pad = 40;
  const w = innerWidth - 2 * pad;
  const h = innerHeight - 2 * pad;
  const dx = bounds.maxx - bounds.minx;
  const dy = bounds.maxy - bounds.miny;
  view.scale = Math.min(w / dx, h / dy);
  view.tx = pad - bounds.minx * view.scale + (w - dx * view.scale) / 2;
  view.ty = pad - bounds.miny * view.scale + (h - dy * view.scale) / 2;
}

function projectAll() {
  for (const p of points) {
    p.sx = p.x * view.scale + view.tx;
    p.sy = p.y * view.scale + view.ty;
  }
}

function render() {
  projectAll();
  ctx.fillStyle = "#0b0d10";
  ctx.fillRect(0, 0, innerWidth, innerHeight);

  if (colorBy === "instrument") {
    // Two-pass: faded guitar background, shuffled minorities on top.
    if (visible.guitar) {
      const s = STYLES.guitar;
      ctx.fillStyle = s.color;
      ctx.globalAlpha = s.alpha;
      const r = s.radius, d = r * 2;
      for (const i of guitarIdx) {
        const p = points[i];
        if (p.sx < -2 || p.sx > innerWidth + 2 || p.sy < -2 || p.sy > innerHeight + 2) continue;
        ctx.fillRect(p.sx - r, p.sy - r, d, d);
      }
    }
    let lastInst = null, r2 = 0, d2 = 0;
    for (const i of minorityIdx) {
      const p = points[i];
      if (!visible[p.instrument]) continue;
      if (p.sx < -2 || p.sx > innerWidth + 2 || p.sy < -2 || p.sy > innerHeight + 2) continue;
      if (p.instrument !== lastInst) {
        const s = STYLES[p.instrument];
        ctx.fillStyle = s.color;
        ctx.globalAlpha = s.alpha;
        r2 = s.radius; d2 = r2 * 2;
        lastInst = p.instrument;
      }
      ctx.fillRect(p.sx - r2, p.sy - r2, d2, d2);
    }
    ctx.globalAlpha = 1;
  } else {
    // Categorical mode: pre-cached per-point colors. fillStyle changes per
    // point are slow (~5x) but at 313K points / 1.4MB palette it's still
    // sub-100ms on a desktop and only fires on pan/zoom, not hover.
    ctx.globalAlpha = 0.7;
    const r = 1.6, d = r * 2;
    for (let i = 0; i < points.length; i++) {
      const p = points[i];
      if (!visible[p.instrument]) continue;
      if (p.sx < -2 || p.sx > innerWidth + 2 || p.sy < -2 || p.sy > innerHeight + 2) continue;
      ctx.fillStyle = pointColors[i];
      ctx.fillRect(p.sx - r, p.sy - r, d, d);
    }
    ctx.globalAlpha = 1;
  }

  if (showClusters && clusters.length) {
    ctx.font = "11px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for (const c of clusters) {
      // Cluster centroids live in a different (3D) space than t-SNE; place each
      // label at the t-SNE coords of its representative voicing instead.
      const rep = c._rep;
      if (!rep) continue;
      const sx = rep.sx, sy = rep.sy;
      if (sx < 0 || sx > innerWidth || sy < 0 || sy > innerHeight) continue;
      ctx.fillStyle = "rgba(0,0,0,0.7)";
      const label = c.display_label || c.id;
      const w = ctx.measureText(label).width + 8;
      ctx.fillRect(sx - w / 2, sy - 8, w, 16);
      ctx.fillStyle = "#fff";
      ctx.fillText(label, sx, sy);
    }
  }
}

function nearestPoint(mx, my) {
  let best = null, bestDist = 12 * 12;
  for (const p of points) {
    if (!visible[p.instrument]) continue;
    const dx = p.sx - mx, dy = p.sy - my;
    const d = dx * dx + dy * dy;
    if (d < bestDist) { bestDist = d; best = p; }
  }
  return best;
}

function voicingKey(p) {
  return p.instrument + "_v" + String(p.id).padStart(4, "0");
}

function showTooltip(p, mx, my) {
  const key = voicingKey(p);
  const d = details[key];
  let html = `<div class="name">${key}</div>`;
  if (d) {
    if (d.n) html += `<div class="row">name: ${d.n}</div>`;
    if (d.f) html += `<div class="row">frets: ${d.f.join(" ")}</div>`;
    if (d.m) html += `<div class="row">midi: ${d.m.join(" ")}</div>`;
    if (d.p) html += `<div class="row">pitch-classes: ${d.p.join(",")}</div>`;
    if (d.s != null) html += `<div class="row">size: ${d.s} note(s)</div>`;
  } else {
    html += `<div class="row" style="color:#666">(no metadata in details file)</div>`;
  }
  html += `<div class="row" style="color:#666">tsne: ${p.x.toFixed(2)}, ${p.y.toFixed(2)}</div>`;
  tooltip.innerHTML = html;
  tooltip.style.display = "block";
  const rect = tooltip.getBoundingClientRect();
  let tx = mx + 14, ty = my + 14;
  if (tx + rect.width > innerWidth) tx = mx - rect.width - 14;
  if (ty + rect.height > innerHeight) ty = my - rect.height - 14;
  tooltip.style.left = tx + "px";
  tooltip.style.top = ty + "px";
}

let mousemoveRaf = 0;
canvas.addEventListener("mousemove", (e) => {
  if (dragging) {
    view.tx += e.clientX - dragging.x;
    view.ty += e.clientY - dragging.y;
    dragging.x = e.clientX; dragging.y = e.clientY;
    render();
    return;
  }
  if (mousemoveRaf) cancelAnimationFrame(mousemoveRaf);
  mousemoveRaf = requestAnimationFrame(() => {
    const p = nearestPoint(e.clientX, e.clientY);
    if (p) showTooltip(p, e.clientX, e.clientY);
    else tooltip.style.display = "none";
  });
});

canvas.addEventListener("mousedown", (e) => {
  dragging = { x: e.clientX, y: e.clientY, startX: e.clientX, startY: e.clientY };
  dragMoved = false;
  canvas.style.cursor = "grabbing";
  tooltip.style.display = "none";
});
addEventListener("mouseup", (e) => {
  if (dragging) {
    // A real drag moves >3px; anything tighter is a click.
    const dx = e.clientX - dragging.startX;
    const dy = e.clientY - dragging.startY;
    if (Math.hypot(dx, dy) < 4) showRegion(e.clientX, e.clientY);
  }
  dragging = null;
  canvas.style.cursor = "crosshair";
});

canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  // Zoom around cursor
  const wx = (e.clientX - view.tx) / view.scale;
  const wy = (e.clientY - view.ty) / view.scale;
  view.scale *= factor;
  view.tx = e.clientX - wx * view.scale;
  view.ty = e.clientY - wy * view.scale;
  render();
}, { passive: false });

for (const inst of ["guitar", "bass", "ukulele"]) {
  document.getElementById("show" + inst[0].toUpperCase() + inst.slice(1))
    .addEventListener("change", (e) => { visible[inst] = e.target.checked; render(); });
}
document.getElementById("showClusters").addEventListener("change", (e) => {
  showClusters = e.target.checked; render();
});

for (const radio of document.querySelectorAll('input[name="colorBy"]')) {
  radio.addEventListener("change", (e) => {
    if (!e.target.checked) return;
    colorBy = e.target.value;
    if (colorBy !== "instrument") rebuildPointColors();
    render();
  });
}

function rebuildPointColors() {
  if (!assignments) return;
  pointColors = new Array(points.length);
  const lookup = colorBy === "cluster" ? assignments.cluster_by_inst : assignments.family_by_inst;
  for (let i = 0; i < points.length; i++) {
    const p = points[i];
    const arr = lookup[p.instrument];
    const idx = (arr && p.id < arr.length) ? arr[p.id] : -1;
    pointColors[i] = categoricalColor(idx);
  }
}

const region = document.getElementById("region");
const selectionMarker = document.getElementById("selectionMarker");

function showRegion(mx, my) {
  // Find every visible point within REGION_RADIUS_PX of the click.
  const r2 = REGION_RADIUS_PX * REGION_RADIUS_PX;
  const hits = [];
  for (const p of points) {
    if (!visible[p.instrument]) continue;
    const dx = p.sx - mx, dy = p.sy - my;
    const d2 = dx * dx + dy * dy;
    if (d2 < r2) hits.push({ p, d2 });
  }
  if (hits.length === 0) {
    region.style.display = "none";
    selectionMarker.style.display = "none";
    return;
  }
  hits.sort((a, b) => a.d2 - b.d2);

  // Per-instrument count.
  const counts = { guitar: 0, bass: 0, ukulele: 0 };
  for (const h of hits) counts[h.p.instrument]++;

  // Pull a sample of names from voicings that have details, prioritising
  // closer hits and trying to spread across instruments.
  const named = [];
  for (const h of hits) {
    if (named.length >= REGION_MAX_LIST) break;
    const key = h.p.instrument + "_v" + String(h.p.id).padStart(4, "0");
    const d = details[key];
    if (d) named.push({ key, d, dist: Math.sqrt(h.d2) });
  }

  let html = '<span class="close" title="dismiss">×</span>';
  html += `<h2>${hits.length} voicing${hits.length === 1 ? "" : "s"} within ${REGION_RADIUS_PX}px</h2>`;
  html += '<div class="summary">';
  for (const inst of ["guitar", "bass", "ukulele"]) {
    if (counts[inst] === 0) continue;
    html += `<span><i style="background:${STYLES[inst].color}"></i>${inst} ${counts[inst]}</span>`;
  }
  html += "</div>";
  if (named.length > 0) {
    html += "<table>";
    for (const n of named) {
      const fingering = n.d.f ? n.d.f.join(" ") : "—";
      html += `<tr><td class="id">${n.key}</td><td class="name">${n.d.n || "?"}</td><td>${fingering}</td></tr>`;
    }
    html += "</table>";
    const detailedTotal = hits.filter(h => details[h.p.instrument + "_v" + String(h.p.id).padStart(4, "0")]).length;
    if (detailedTotal > named.length) {
      html += `<div class="more">+ ${detailedTotal - named.length} more with metadata, ${hits.length - detailedTotal} without</div>`;
    } else if (hits.length > named.length) {
      html += `<div class="more">+ ${hits.length - named.length} without metadata</div>`;
    }
  } else {
    html += `<div class="more">no metadata for any voicing in this region (try the dense blue clusters)</div>`;
  }
  region.innerHTML = html;
  region.style.display = "block";
  region.querySelector(".close").addEventListener("click", () => {
    region.style.display = "none";
    selectionMarker.style.display = "none";
  });

  // Draw a selection circle so the user remembers what they clicked.
  selectionMarker.style.display = "block";
  selectionMarker.style.left = (mx - REGION_RADIUS_PX) + "px";
  selectionMarker.style.top = (my - REGION_RADIUS_PX) + "px";
  selectionMarker.style.width = (REGION_RADIUS_PX * 2) + "px";
  selectionMarker.style.height = (REGION_RADIUS_PX * 2) + "px";
}

async function fetchJSON(url, label) {
  meta.textContent = "loading " + label + "…";
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${url}: ${res.status}`);
  return res.json();
}

async function main() {
  resize();
  try {
    const tsne = await fetchJSON("data/voicings-tsne-313k-perp80.json", "t-SNE points");
    points = tsne.points;
    let minx = Infinity, maxx = -Infinity, miny = Infinity, maxy = -Infinity;
    guitarIdx = [];
    minorityIdx = [];
    for (let i = 0; i < points.length; i++) {
      const p = points[i];
      if (p.x < minx) minx = p.x;
      if (p.x > maxx) maxx = p.x;
      if (p.y < miny) miny = p.y;
      if (p.y > maxy) maxy = p.y;
      if (p.instrument === "guitar") guitarIdx.push(i);
      else minorityIdx.push(i);
    }
    bounds = { minx, maxx, miny, maxy };
    // Fisher-Yates shuffle so bass and ukulele get fair occlusion ties.
    for (let i = minorityIdx.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [minorityIdx[i], minorityIdx[j]] = [minorityIdx[j], minorityIdx[i]];
    }

    const detailsArr = await fetchJSON("data/voicing-details.json", "voicing details");
    for (const d of detailsArr) details[d.g] = d;

    try { clusters = await fetchJSON("data/cluster-layout.json", "cluster layout"); }
    catch { clusters = []; }

    try { assignments = await fetchJSON("data/cluster-assignments.json", "cluster assignments"); }
    catch (e) { console.warn("cluster-assignments unavailable; cluster/family colour modes disabled", e); }

    // Index points by (instrument, id) so we can resolve each cluster's
    // representative voicing to its t-SNE position.
    const pointIdx = new Map();
    for (const p of points) pointIdx.set(p.instrument + "/" + p.id, p);
    for (const c of clusters) {
      c._rep = pointIdx.get(c.instrument + "/" + c.representative_voicing_idx) || null;
    }

    fitView();
    // Allow URL-hash override for screenshotting (e.g. #colorBy=cluster).
    const hashParams = new URLSearchParams(location.hash.replace(/^#/, ""));
    const hashColor = hashParams.get("colorBy");
    if (assignments && (hashColor === "cluster" || hashColor === "family")) {
      colorBy = hashColor;
      const radio = document.querySelector(`input[name="colorBy"][value="${hashColor}"]`);
      if (radio) radio.checked = true;
      rebuildPointColors();
    }
    render();
    meta.innerHTML = `<b>${points.length.toLocaleString()}</b> voicings · perplexity ${tsne.perplexity} · ${tsne.iterations} iters · ${Object.keys(details).length.toLocaleString()} with metadata · ${clusters.length} clusters`;
  } catch (err) {
    meta.textContent = "error: " + err.message;
    console.error(err);
  }
}

main();
</script>
</body>
</html>
