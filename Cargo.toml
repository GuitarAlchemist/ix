# Registry infrastructure
linkme = "0.3"
schemars = "0.8"
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

# Testing & benchmarking
proptest = "1"
criterion = { version = "0.5", features = ["html_reports"] }
