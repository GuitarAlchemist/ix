ix-governance = { path = "crates/ix-governance", version = "0.1.0" }
ix-code = { path = "crates/ix-code", version = "0.1.0" }
ix-types = { path = "crates/ix-types", version = "0.1.0" }
ix-registry = { path = "crates/ix-registry", version = "0.1.0" }
ix-skill-macros = { path = "crates/ix-skill-macros", version = "0.1.0" }
ix-context = { path = "crates/ix-context", version = "0.1.0" }
